name: Instagram Tracker

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install instaloader pyairtable pytz
      
      - name: Run Instagram tracker
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: appqblRpkPud9ywI9
          AIRTABLE_TABLE_ID: tbl4Jx1Km6vvzeqrQ
        run: |
          python tracker.py
